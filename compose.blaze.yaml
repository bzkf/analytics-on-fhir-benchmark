services:
  blaze:
    image: docker.io/samply/blaze:1.0.4@sha256:43adac716f62d8535615b68a63ce91d288470ad1e39a96453771ac11eb6d5635
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx64g"
      BASE_URL: "http://localhost:8083"
      ENFORCE_REFERENTIAL_INTEGRITY: false
    volumes:
      - "blaze-data:/app/data"
    ports:
      - "127.0.0.1:8083:8080"

  wait-for-blaze:
    image: docker.io/curlimages/curl:8.8.0@sha256:73e4d532ea62d7505c5865b517d3704966ffe916609bedc22af6833dc9969bcd
    ipc: none
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    privileged: false
    restart: "no"
    environment:
      BLAZE_SERVER_URL: http://blaze:8080
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until [ "$(curl -s -o /dev/null -L -w "%{http_code}" "$$BLAZE_SERVER_URL/fhir/metadata")" == "200" ]; do
            echo "$(date): Waiting for blaze server @ $$BLAZE_SERVER_URL to be up";
            sleep 5;
        done;
    depends_on:
      blaze:
        condition: service_started

volumes:
  blaze-data: {}
