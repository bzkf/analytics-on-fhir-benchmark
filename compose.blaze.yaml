services:
  blaze:
    image: docker.io/samply/blaze:1.2.0@sha256:7928414bf68d0610587b96a67d2318b789c8531329dead4cec7e295adb4cd86f
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx64g"
      BASE_URL: "http://localhost:8083"
      DB_BLOCK_CACHE_SIZE: "17179" # 16 GiB in MB
      # per <https://samply.github.io/blaze/production-configuration.html>
      DB_RESOURCE_CACHE_SIZE: "10000000"
    volumes:
      - "blaze-data:/app/data"
    ports:
      - "127.0.0.1:8083:8080"

  wait-for-blaze:
    image: docker.io/curlimages/curl:8.14.1@sha256:9a1ed35addb45476afa911696297f8e115993df459278ed036182dd2cd22b67b
    ipc: none
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    privileged: false
    restart: "no"
    environment:
      BLAZE_SERVER_URL: http://blaze:8080
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until [ "$(curl -s -o /dev/null -L -w "%{http_code}" "$$BLAZE_SERVER_URL/fhir/metadata")" == "200" ]; do
            echo "$(date): Waiting for blaze server @ $$BLAZE_SERVER_URL to be up";
            sleep 5;
        done;
    depends_on:
      blaze:
        condition: service_started

volumes:
  blaze-data: {}
