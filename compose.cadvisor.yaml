services:
  prometheus:
    image: docker.io/prom/prometheus:v3.7.3
    ports:
      - 127.0.0.1:9090:9090
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
    volumes:
      - $PWD/config/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
    depends_on:
      - cadvisor
    deploy:
      resources:
        limits:
          memory: 1g

  cadvisor:
    image: ghcr.io/google/cadvisor:v0.53.0
    ports:
      - 127.0.0.1:8090:8080
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    deploy:
      resources:
        limits:
          memory: 1g
